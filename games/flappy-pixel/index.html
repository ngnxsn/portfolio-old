<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Flappy Gà Pixel</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrap">
    <img class="title-image" src="assets/title.png" alt="Flappy Gà" />
    <div class="hud">
      <span>Điểm: <b id="score">0</b></span>
      <span>Level: <b id="level">1</b></span>
      <span>Mạng: <b id="lives">1</b></span>
      <span>Best: <b id="best">0</b></span>
    </div>
    <canvas id="game" width="432" height="768"></canvas>
    <p class="credit">Created by Nguyễn Sơn</p>
  </div>
  <script src="game.js"></script>
</body>
</html>
